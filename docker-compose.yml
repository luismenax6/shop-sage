services:
  db:
    image: pgvector/pgvector:pg16
    container_name: shopsage-db
    environment:
      POSTGRES_USER: shopsage
      POSTGRES_PASSWORD: shopsage_local_dev
      POSTGRES_DB: shopsage
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopsage -d shopsage"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
