<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: radial-gradient(circle at 30% 20%, #1f2937, #0b1220);
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.1rem;
        font-family: system-ui, -apple-system, sans-serif;
      }
      h2 { color: #e5e7eb; font-size: 1.5rem; font-weight: 600; }
      h2 span { color: #818cf8; }
      img {
        max-width: 90vw;
        max-height: 80vh;
        object-fit: contain;
        background: #fff;
        border-radius: 12px;
        padding: 12px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      }
    </style>
  </head>
  <body>
    <h2>🛒 Shop<span>Sage</span> — architecture on AWS</h2>
    <img src="shopsage-architecture.png" alt="ShopSage AWS architecture" />
  </body>
</html>
